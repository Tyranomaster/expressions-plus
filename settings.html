<div class="expressions_plus_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Expressions+</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>

        <div class="inline-drawer-content">
            <!-- Basic Settings -->
            <label class="checkbox_label" for="expressions_plus_translate" title="Use the selected API from Chat Translation extension settings.">
                <input id="expressions_plus_translate" type="checkbox">
                <span>Translate text to English before classification</span>
            </label>
            <label class="checkbox_label" for="expressions_plus_allow_multiple" title="A single expression can have multiple sprites. Whenever the expression is chosen, a random sprite will be selected.">
                <input id="expressions_plus_allow_multiple" type="checkbox">
                <span>Allow multiple sprites per expression</span>
            </label>
            <label class="checkbox_label" for="expressions_plus_reroll" title="If the same expression is used again, re-roll the sprite.">
                <input id="expressions_plus_reroll" type="checkbox">
                <span>Re-roll if same sprite is used again</span>
            </label>

            <hr>

            <!-- API Settings -->
            <div class="flex-container flexFlowColumn">
                <label for="expressions_plus_api">Classifier API</label>
                <select id="expressions_plus_api" class="text_pole">
                    <option value="99">[ None ]</option>
                    <option value="0">Local</option>
                    <option value="1">Extras (deprecated)</option>
                    <option value="2">Main API (LLM)</option>
                    <option value="3">WebLLM Extension</option>
                </select>
            </div>

            <!-- LLM Settings -->
            <div class="expressions_plus_llm_prompt_block flex-container flexFlowColumn marginTop5">
                <label for="expressions_plus_llm_prompt">LLM Prompt</label>
                <textarea id="expressions_plus_llm_prompt" class="text_pole textarea_compact" rows="2" placeholder="Use {{labels}} macro"></textarea>
                <div class="flex-container marginTop5">
                    <label class="checkbox_label">
                        <input type="radio" name="expressions_plus_prompt_type" value="raw">
                        <span>Limited Context</span>
                    </label>
                    <label class="checkbox_label">
                        <input type="radio" name="expressions_plus_prompt_type" value="full">
                        <span>Full Context</span>
                    </label>
                </div>
            </div>

            <!-- Fallback Expression -->
            <div class="flex-container flexFlowColumn marginTop5">
                <label for="expressions_plus_fallback">Default / Fallback Expression</label>
                <select id="expressions_plus_fallback" class="text_pole"></select>
            </div>

            <hr>

            <!-- Profile Management -->
            <div class="flex-container justifySpaceBetween alignItemsCenter">
                <label for="expressions_plus_profile_select">Active Profile</label>
                <div class="flex-container gap5px">
                    <div id="expressions_plus_profile_create" class="menu_button menu_button_icon" title="Create Profile">
                        <i class="fa-solid fa-plus"></i>
                    </div>
                    <div id="expressions_plus_profile_delete" class="menu_button menu_button_icon" title="Delete Profile">
                        <i class="fa-solid fa-trash"></i>
                    </div>
                    <div id="expressions_plus_profile_export" class="menu_button menu_button_icon" title="Export Profile">
                        <i class="fa-solid fa-file-export"></i>
                    </div>
                    <div id="expressions_plus_profile_import" class="menu_button menu_button_icon" title="Import Profile">
                        <i class="fa-solid fa-file-import"></i>
                    </div>
                </div>
            </div>
            <select id="expressions_plus_profile_select" class="text_pole"></select>

            <hr>

            <!-- Custom Expression Rules -->
            <div class="flex-container justifySpaceBetween alignItemsCenter">
                <label>Custom Expression Rules</label>
                <div id="expressions_plus_add_rule" class="menu_button menu_button_icon">
                    <i class="fa-solid fa-plus"></i>
                    <span>Add Rule</span>
                </div>
            </div>
            <div id="expressions_plus_rules_list"></div>
            <div class="base_rules_info">
                <small id="expressions_plus_base_rules_count"></small>
            </div>

            <hr>

            <!-- Character Assignments -->
            <div class="expressions_plus_collapsible">
                <div class="flex-container justifySpaceBetween alignItemsCenter section_toggle">
                    <label>Character Profile Assignments</label>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="section_content" style="display: none;">
                    <small>Assign specific profiles to characters. Unassigned characters use the active profile.</small>
                    <div id="expressions_plus_character_assignments"></div>
                </div>
            </div>

            <hr>

            <!-- Insight Panel Toggle -->
            <label class="checkbox_label" for="expressions_plus_insight_toggle">
                <input id="expressions_plus_insight_toggle" type="checkbox">
                <span>Show Insight Panel</span>
            </label>

            <hr>

            <!-- Sprite List -->
            <div id="expressions_plus_no_chat">
                Open a chat to see the character expressions.
            </div>
            <div id="expressions_plus_open_chat" style="display: none;">
                <div class="offline_mode" style="display: none;">
                    <small>You are in offline mode. Click on the image below to set the expression.</small>
                </div>
                <div class="flex-container alignItemsCenter">
                    <strong>Sprite set:</strong>&nbsp;<span id="expressions_plus_image_list_header_name"></span>
                </div>
                <div id="expresssions_plus_image_list"></div>
            </div>
        </div>
    </div>
    
    <form style="display: none;">
        <input type="file" id="expressions_plus_upload" accept="image/*">
    </form>
</div>
